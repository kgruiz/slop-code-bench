id: sorted-key-indexed-dict-comprehension
language: python
severity: warning
message: sorted(d.keys()) plus indexed lookup is noisier than iterating items directly
metadata:
  weight: 4
  category: slop
rule:
  any:
  - pattern: '{$K: $DICT[$K] for $K in sorted($DICT.keys())}'
  - pattern: '{$K: $F($DICT[$K]) for $K in sorted($DICT.keys())}'
