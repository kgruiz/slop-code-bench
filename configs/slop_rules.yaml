id: init-populate-iterate-dict
language: python
severity: hint
message: 'Initialize-populate-iterate pattern detected on ''$DICT''.

  Empty dict is created, populated in a loop, then iterated over.

  '
note: 'Consider refactoring to:

  1. Dict comprehension: {key: val for item in items}

  2. Helper function: def build_lookup(items) -> dict

  3. Inline the logic if the intermediate dict isn''t needed elsewhere

  '
metadata:
  weight: 4
  category: slop
rule:
  pattern: "for $VARS in $DICT.$METHOD():\n    $$$BODY\n"
  follows:
    all:
    - kind: for_statement
    - has:
        kind: subscript
        all:
        - has:
            kind: identifier
            field: value
            pattern: $DICT
        - inside:
            kind: assignment
            field: left
        stopBy: end
    - follows:
        kind: expression_statement
        has:
          kind: assignment
          all:
          - has:
              kind: identifier
              field: left
              pattern: $DICT
          - has:
              kind: dictionary
              field: right
              not:
                has:
                  kind: pair
        stopBy:
          kind: for_statement
    stopBy: end
constraints:
  METHOD:
    regex: ^(items|keys|values)$
---
id: init-populate-iterate-list
language: python
severity: hint
message: 'Initialize-populate-iterate pattern detected on ''$LIST''.

  Empty list is created, populated via .append() in a loop, then iterated over.

  '
note: 'Consider refactoring to:

  1. List comprehension: [val for item in items if cond]

  2. Helper function: def collect_items(source) -> list

  3. Generator expression if only iterating once: (val for item in items)

  '
metadata:
  weight: 4
  category: slop
rule:
  pattern: "for $VAR in $LIST:\n    $$$BODY\n"
  not:
    has:
      kind: call
      has:
        kind: attribute
        regex: \.(items|keys|values)$
  follows:
    all:
    - kind: for_statement
    - has:
        kind: call
        has:
          kind: attribute
          all:
          - has:
              kind: identifier
              field: object
              pattern: $LIST
          - has:
              field: attribute
              regex: ^append$
        stopBy: end
    - follows:
        kind: expression_statement
        has:
          kind: assignment
          all:
          - has:
              kind: identifier
              field: left
              pattern: $LIST
          - has:
              kind: list
              field: right
              not:
                has:
                  any:
                  - kind: identifier
                  - kind: string
                  - kind: integer
        stopBy:
          kind: for_statement
    stopBy: end
---
