---
id: chained-comparison-opportunity
language: python
severity: warning
message: Use chained comparison (e.g., a < b < c) instead of 'and'
metadata:
  weight: 3
  category: slop
rule:
  kind: boolean_operator
  any:
  - pattern: $A < $B and $B < $C
  - pattern: $A > $B and $B > $C
  - pattern: $A <= $B and $B <= $C
  - pattern: $A >= $B and $B >= $C
  - pattern: $A < $B and $B <= $C
  - pattern: $A <= $B and $B < $C
  - pattern: $A > $B and $B >= $C
  - pattern: $A >= $B and $B > $C
---
id: chained-dict-get
language: python
severity: warning
message: Chained .get().get() - overly defensive, extract to helper
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  has:
    kind: attribute
    has:
      kind: call
      has:
        kind: attribute
        regex: \.get$
    regex: \.get$
---
id: comprehension-used-but-ignored-result
language: python
severity: warning
message: Comprehension result is never used - this looks like a side-effect-only comprehension
metadata:
  weight: 3
  category: slop
rule:
  kind: expression_statement
  has:
    any:
    - kind: list_comprehension
    - kind: set_comprehension
    - kind: dictionary_comprehension
    - kind: generator_expression
---
id: duplicated-if-condition
language: python
severity: warning
message: Duplicated if condition in elif chain
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  pattern: "if $COND:\n  $$$\nelif $COND:\n  $$$\n"
---
id: isinstance-return-ladder
language: python
severity: warning
message: Long isinstance/elif ladder returning simple values; prefer a dispatch table
  or polymorphism.
metadata:
  weight: 3
  category: slop
rule:
  pattern: "if isinstance($X, $T1):\n  return $V1\nelif isinstance($X, $T2):\n  return\
    \ $V2\n"
---
id: manual-min-max
language: python
severity: warning
message: Manual min/max logic - use built-in min() or max()
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  any:
  - pattern: "if $A > $B:\n  $M = $A\nelse:\n  $M = $B\n"
  - pattern: "if $A < $B:\n  $M = $A\nelse:\n  $M = $B\n"
  - pattern: "if $A >= $B:\n  $M = $A\nelse:\n  $M = $B\n"
  - pattern: "if $A <= $B:\n  $M = $A\nelse:\n  $M = $B\n"
---
id: manual-str-join
language: python
severity: warning
message: Augmented assignment in loop - if building a string, use ''.join()
metadata:
  weight: 3
  category: slop
rule:
  kind: for_statement
  has:
    kind: block
    has:
      kind: expression_statement
      has:
        kind: augmented_assignment
        pattern: $S += $X
---
id: nested-if-no-else
language: python
severity: warning
message: Nested if statements without else - consider flattening or combining conditions
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  has:
    kind: block
    has:
      kind: if_statement
      not:
        has:
          kind: else_clause
---
id: pointless-lambda-call
language: python
severity: warning
message: Immediately called lambda - just execute the code
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  has:
    kind: parenthesized_expression
    has:
      kind: lambda
---
id: repeated-dict-key-assignment
language: python
severity: warning
message: Repeated dict[key] = func(...) pattern - consider loop or dict comprehension
metadata:
  weight: 3
  category: slop
rule:
  kind: expression_statement
  has:
    kind: assignment
    pattern: $DICT[$KEY] = $FUNC($$$)
  follows:
    kind: expression_statement
    has:
      kind: assignment
      pattern: $DICT[$KEY2] = $FUNC($$$)
---
id: repeated-if-continue
language: python
severity: warning
message: Multiple if-continue guards - consider list comprehension or filter function
metadata:
  weight: 3
  category: slop
rule:
  kind: for_statement
  has:
    kind: block
    has:
      kind: if_statement
      has:
        kind: block
        has:
          kind: continue_statement
      follows:
        kind: if_statement
        has:
          kind: block
          has:
            kind: continue_statement
---
id: repeated-if-return-error
language: python
severity: warning
message: Multiple if-return error checks - consolidate validation logic
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  has:
    kind: block
    has:
      kind: return_statement
      regex: error|Error|ERROR
  follows:
    kind: if_statement
    has:
      kind: block
      has:
        kind: return_statement
        regex: error|Error|ERROR
---
id: repeated-validation-calls
language: python
severity: warning
message: Repeated validation function calls - consider data-driven validation
metadata:
  weight: 3
  category: slop
rule:
  kind: expression_statement
  has:
    kind: call
    regex: ^validate_
  follows:
    kind: expression_statement
    has:
      kind: call
      regex: ^validate_
---
id: ternary-same-value
language: python
severity: warning
message: Ternary returns same value for both branches - remove condition
metadata:
  weight: 3
  category: slop
rule:
  kind: conditional_expression
  pattern: $VALUE if $COND else $VALUE
---
id: repeated-function-or-chain
language: python
severity: warning
message: Same function called 4+ times with 'or' - use any(func(x) for x in [...])
metadata:
  weight: 3
  category: slop
rule:
  kind: boolean_operator
  pattern: $F($$$A) or $F($$$B) or $F($$$C) or $F($$$D)
---
id: value-compare-return-ladder
language: python
severity: warning
message: Long value comparison ladder returning literals; prefer a dispatch map or
  dict lookup with a default.
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  pattern: "if $X == $V1:\n  return $R1\nelif $X == $V2:\n  return $R2\nelif $X ==\
    \ $V3:\n  return $R3\n"
  not:
    has:
      kind: else_clause
---
id: repetitive-list-append-elif
language: python
severity: warning
message: Appending to the same list across elifs reads like copy/paste - refactor
metadata:
  weight: 3
  category: slop
rule:
  pattern: "if $C1:\n  $L.append($A)\nelif $C2:\n  $L.append($B)\nelif $C3:\n  $L.append($C)\n"
---
id: for-range-len
language: python
severity: warning
message: range(len(seq)) loop suggests index juggling; prefer enumerate
metadata:
  weight: 3
  category: slop
rule:
  pattern: "for $I in range(len($SEQ)):\n  $$$\n"
---
id: boolean-return-if-else
language: python
severity: warning
message: if/else returning True/False - simplify to return the condition directly
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  any:
  - pattern: "if $COND:\n  return True\nelse:\n  return False\n"
  - pattern: "if $COND:\n  return False\nelse:\n  return True\n"
---
id: json-dumps-then-loads
language: python
severity: warning
message: json.loads(json.dumps(x)) is noisy; copy the structure directly
metadata:
  weight: 3
  category: slop
rule:
  pattern: json.loads(json.dumps($X))
---
id: pointless-bool-cast
language: python
severity: warning
message: Wrapping a condition in bool() before if is redundant ceremony
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  pattern: "if bool($COND):\n  $$$\n"
---
id: consecutive-if-same-variable
language: python
severity: warning
message: Consecutive if statements checking same variable - should use elif for efficiency
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  has:
    kind: comparison_operator
    has:
      kind: identifier
      pattern: $VAR
  follows:
    kind: if_statement
    all:
    - has:
        kind: comparison_operator
        has:
          kind: identifier
          pattern: $VAR
    - has:
        kind: block
        has:
          kind: return_statement
    stopBy: neighbor
---
id: nested-attribute-guard-chain
language: python
severity: warning
message: 'Nested attribute guard chain (if x: if x.y: if x.y.z:) - use walrus operator
  or getattr'
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  all:
  - has:
      kind: identifier
      pattern: $OBJ
  - has:
      kind: block
      has:
        kind: if_statement
        all:
        - has:
            kind: attribute
            has:
              kind: identifier
              pattern: $OBJ
        - has:
            kind: block
            has:
              kind: if_statement
---
id: repeated-isinstance-validation
language: python
severity: warning
message: Repeated isinstance validation pattern - extract to validation helper or
  use schema
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  all:
  - has:
      kind: not_operator
      has:
        kind: call
        pattern: isinstance($VAR, $TYPE)
  - has:
      kind: block
      has:
        kind: raise_statement
  follows:
    kind: if_statement
    all:
    - has:
        kind: not_operator
        has:
          kind: call
          regex: isinstance
    - has:
        kind: block
        has:
          kind: raise_statement
    stopBy: neighbor
---
id: split-magic-index
language: python
severity: warning
message: String split with magic index - extract to named variable or use unpacking
metadata:
  weight: 3
  category: slop
rule:
  kind: subscript
  all:
  - has:
      kind: call
      has:
        kind: attribute
        regex: \.split$
  - has:
      kind: integer
      regex: ^[2-9]|[1-9][0-9]+$
---
id: ternary-none-comparison
language: python
severity: warning
message: Ternary with None comparison - consider using 'or' operator or walrus
metadata:
  weight: 3
  category: slop
rule:
  kind: conditional_expression
  pattern: $VAL if $VAR is None else $OTHER
---
id: redundant-bool-in-condition
language: python
severity: warning
message: Redundant bool() cast in condition - if already checks truthiness
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  has:
    kind: boolean_operator
    has:
      kind: call
      pattern: bool($X)
---
id: deep-dict-access
language: python
severity: warning
message: Deep nested dict access (4+ levels) - extract to helper or use dataclass
metadata:
  weight: 3
  category: slop
rule:
  kind: subscript
  has:
    kind: subscript
    has:
      kind: subscript
      has:
        kind: subscript
---
id: long-tuple-unpacking
language: python
severity: warning
message: Unpacking 5+ values from tuple - use named tuple or dataclass
metadata:
  weight: 3
  category: slop
rule:
  kind: assignment
  has:
    kind: pattern_list
    has:
      nthChild:
        position: 5
---
id: fetchone-none-check
language: python
severity: hint
message: cursor.fetchone() followed by None check - common pattern, consider helper
metadata:
  weight: 3
  category: slop
rule:
  kind: if_statement
  has:
    kind: comparison_operator
    regex: is None
  follows:
    kind: expression_statement
    has:
      kind: assignment
      has:
        kind: call
        has:
          kind: attribute
          regex: \.fetchone$
    stopBy: neighbor
---
id: dict-get-zero-default
language: python
severity: warning
message: dict.get() with 0 default - consider if missing key should really be 0
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  all:
  - has:
      kind: attribute
      regex: \.get$
  - has:
      kind: argument_list
      has:
        kind: integer
        regex: ^0$
        nthChild:
          position: 2
---
id: dict-get-empty-string-default
language: python
severity: warning
message: dict.get() with '' default - consider if missing key should really be empty
  string
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  all:
  - has:
      kind: attribute
      regex: \.get$
  - has:
      kind: argument_list
      has:
        kind: string
        regex: ^['"]['"]$
        nthChild:
          position: 2
---
id: dict-get-empty-list-default
language: python
severity: warning
message: dict.get() with [] default - mutable default, use .setdefault() or defaultdict
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  all:
  - has:
      kind: attribute
      regex: \.get$
  - has:
      kind: argument_list
      has:
        kind: list
        not:
          has:
            any:
            - kind: identifier
            - kind: integer
            - kind: string
        nthChild:
          position: 2
---
id: dict-get-empty-dict-default
language: python
severity: warning
message: dict.get() with {} default - mutable default, use .setdefault() or defaultdict
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  all:
  - has:
      kind: attribute
      regex: \.get$
  - has:
      kind: argument_list
      has:
        kind: dictionary
        not:
          has:
            kind: pair
        nthChild:
          position: 2
---
id: check-key-in-dict-keys
language: python
severity: warning
message: Checking 'key in dict.keys()' - inefficient, use 'key in dict'
metadata:
  weight: 3
  category: slop
rule:
  kind: comparison_operator
  regex: \sin\s
  has:
    kind: call
    has:
      kind: attribute
      regex: \.keys$
---
id: json-loads-read
language: python
severity: warning
message: json.loads(f.read()) - use json.load(f)
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  has:
    kind: argument_list
    has:
      kind: call
      has:
        kind: attribute
        regex: \.read$
---
id: json-roundtrip-dumps-loads
language: python
severity: warning
message: json.loads(json.dumps(obj)) round-trip without mutation is pointless; avoid
  double serialization.
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  pattern: json.loads(json.dumps($OBJ))
---
id: list-dict-keys
language: python
severity: warning
message: list(d.keys()) is verbose - use list(d) or iterate directly
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  all:
  - has:
      kind: identifier
      regex: ^list$
  - has:
      kind: argument_list
      has:
        kind: call
        has:
          kind: attribute
          regex: \.keys$
---
id: listcomp-in-builtin-call
language: python
severity: warning
message: List comprehension in all/any/sum/set/dict call - use generator expression
  or comprehension for memory efficiency
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  all:
  - has:
      kind: identifier
      regex: ^(all|any|sum|set|dict)$
  - has:
      kind: argument_list
      has:
        kind: list_comprehension
---
id: unnecessary-list-call
language: python
severity: warning
message: Unnecessary list() around iterable in for loop
metadata:
  weight: 3
  category: slop
rule:
  kind: for_statement
  has:
    kind: call
    has:
      kind: identifier
      regex: ^list$
---
id: len-as-condition
language: python
severity: warning
message: Comparing len() to 0 is verbose - use truthiness 'if x:' or 'if not x:'
metadata:
  weight: 3
  category: slop
rule:
  kind: comparison_operator
  all:
  - has:
      kind: call
      has:
        kind: identifier
        regex: ^len$
  - has:
      kind: integer
      pattern: '0'
---
id: list-map-filter
language: python
severity: warning
message: list(map(...)) or list(filter(...)) - consider list comprehension instead
metadata:
  weight: 3
  category: slop
rule:
  kind: call
  all:
  - has:
      kind: identifier
      regex: ^list$
  - has:
      kind: argument_list
      has:
        kind: call
        has:
          kind: identifier
          regex: ^(map|filter)$
---
id: range-len-antipattern
language: python
severity: warning
message: for i in range(len(x)) - use 'enumerate(x)' or iterate directly
metadata:
  weight: 3
  category: slop
rule:
  kind: for_statement
  has:
    kind: call
    all:
    - has:
        kind: identifier
        regex: ^range$
    - has:
        kind: argument_list
        has:
          kind: call
          has:
            kind: identifier
            regex: ^len$
---
id: membership-test-list-literal
language: python
severity: warning
message: Membership test on list literal with 4+ items - use set literal {...} for
  O(1) lookup
metadata:
  weight: 3
  category: slop
rule:
  kind: comparison_operator
  pattern: $X in [$A, $B, $C, $D, $$$REST]
---
id: bool-comparison
language: python
severity: warning
message: Comparing to boolean literal - use 'if x' instead of 'if x == True'
metadata:
  weight: 2
  category: slop
rule:
  kind: comparison_operator
  regex: ==\s*(True|False)
---
id: chained-none-check
language: python
severity: warning
message: Chained 'is not None' checks - use try/except or walrus operator
metadata:
  weight: 2
  category: slop
rule:
  kind: boolean_operator
  regex: is not None\s+(and|or)\s+\w+\s+is not None
---
id: dict-get-default-none
language: python
severity: warning
message: dict.get(k, None) - None is the default return value, so the second argument
  is redundant
metadata:
  weight: 2
  category: slop
rule:
  kind: call
  all:
  - has:
      kind: attribute
      regex: \.get$
  - has:
      kind: argument_list
      has:
        kind: none
---
id: empty-init
language: python
severity: warning
message: Empty __init__ method - redundant
metadata:
  weight: 2
  category: slop
rule:
  kind: function_definition
  all:
  - has:
      kind: identifier
      regex: ^__init__$
  - has:
      kind: block
      has:
        kind: pass_statement
---
id: empty-string-or
language: python
severity: warning
message: Checking empty string with 'or' - defensive pattern
metadata:
  weight: 2
  category: slop
rule:
  kind: boolean_operator
  regex: ==\s*(""|'')\s+(or|and)
---
id: explicit-bool-cast
language: python
severity: warning
message: bool() cast - usually unnecessary, use truthiness directly
metadata:
  weight: 2
  category: slop
rule:
  kind: call
  has:
    kind: identifier
    regex: ^bool$
---
id: get-then-none-check
language: python
severity: warning
message: .get() followed by None check - use 'in' check or EAFP
metadata:
  weight: 2
  category: slop
rule:
  kind: if_statement
  has:
    kind: comparison_operator
    regex: is None|is not None
  follows:
    kind: expression_statement
    has:
      kind: assignment
      has:
        kind: call
        has:
          kind: attribute
          regex: \.get$
---
id: guard-return-none
language: python
severity: warning
message: 'if x is None: return None - overly defensive early guard'
metadata:
  weight: 2
  category: slop
rule:
  kind: if_statement
  pattern: 'if $X is None: return None'
---
id: if-none-raise
language: python
severity: warning
message: 'if x is None: raise - defensive None guard before operation'
metadata:
  weight: 2
  category: slop
rule:
  kind: if_statement
  all:
  - has:
      kind: comparison_operator
      regex: is None
  - has:
      kind: block
      has:
        kind: raise_statement
---
id: if-not-guard
language: python
severity: warning
message: 'if not x: raise/return - defensive guard pattern'
metadata:
  weight: 2
  category: slop
rule:
  kind: if_statement
  all:
  - has:
      kind: not_operator
  - has:
      kind: block
      any:
      - has:
          kind: raise_statement
      - has:
          kind: return_statement
---
id: if-return-bool-else
language: python
severity: warning
message: if/else returning True/False - simplify to 'return bool(condition)'
metadata:
  weight: 2
  category: slop
rule:
  kind: if_statement
  all:
  - has:
      kind: block
      has:
        kind: return_statement
        regex: return True
  - has:
      kind: else_clause
      has:
        kind: block
        has:
          kind: return_statement
          regex: return False
---
id: int-float-coerce
language: python
severity: warning
message: Casting via int(float(x)) is sloppy and can mis-handle strings; parse once
  or validate explicitly.
metadata:
  weight: 2
  category: slop
rule:
  kind: call
  pattern: int(float($X))
---
id: len-comparison
language: python
severity: warning
message: len() > 0 or len() != 0 - use truthiness instead
metadata:
  weight: 2
  category: slop
rule:
  kind: comparison_operator
  has:
    kind: call
    regex: ^len\(
  regex: (>\s*0|!=\s*0|>=\s*1)
---
id: manual-dict-setdefault
language: python
severity: warning
message: 'Manual dict setdefault pattern (if k not in d: d[k] = ...) - use d.setdefault()'
metadata:
  weight: 2
  category: slop
rule:
  kind: if_statement
  all:
  - has:
      kind: comparison_operator
      regex: not in
  - has:
      kind: block
      has:
        kind: expression_statement
        has:
          kind: assignment
          has:
            kind: subscript
---
id: multiple-isinstance-or
language: python
severity: warning
message: Multiple isinstance() with or - use isinstance(x, (A, B)) tuple form
metadata:
  weight: 2
  category: slop
rule:
  kind: boolean_operator
  regex: isinstance.*or.*isinstance
---
id: range-len-pattern
language: python
severity: warning
message: range(len(x)) - use enumerate() instead
metadata:
  weight: 2
  category: slop
rule:
  kind: call
  pattern: range(len($X))
---
id: redundant-bool-ternary
language: python
severity: warning
message: Redundant boolean ternary 'True if x else False' - use 'bool(x)'
metadata:
  weight: 2
  category: slop
rule:
  kind: conditional_expression
  regex: True\s+if.*else\s+False|False\s+if.*else\s+True
---
id: redundant-continue
language: python
severity: warning
message: Redundant continue at end of loop
metadata:
  weight: 2
  category: slop
rule:
  kind: block
  regex: continue\s*$
  inside:
    any:
    - kind: for_statement
    - kind: while_statement
---
id: redundant-list-comprehension
language: python
severity: warning
message: Redundant list comprehension - usage of [x for x in iterable] is unnecessary,
  use list(iterable)
metadata:
  weight: 2
  category: slop
rule:
  kind: list_comprehension
  pattern: '[$X for $X in $ITER]'
---
id: redundant-none-empty-check
language: python
severity: warning
message: Redundant None and empty check - use truthiness
metadata:
  weight: 2
  category: slop
rule:
  kind: boolean_operator
  regex: is not None.*(!=\s*""|len\(|==\s*""|!=\s*''|==\s*'')
---
id: redundant-return-none
language: python
severity: warning
message: Explicit 'return None' at end of function - implicit None is cleaner
metadata:
  weight: 2
  category: slop
rule:
  kind: return_statement
  regex: ^return None$
---
id: set-literal-list
language: python
severity: warning
message: set([list]) - use set literal {x, y} instead
metadata:
  weight: 2
  category: slop
